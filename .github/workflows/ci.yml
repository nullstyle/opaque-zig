name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same ref (e.g. rapid pushes / PR updates).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the default GITHUB_TOKEN is read-only here. No job pushes,
# deploys, or comments, so nothing more is granted.
#
# Supply-chain hardening: every action is pinned to a full commit SHA, which is
# immutable. A floating tag like `@v4` can be silently repointed by an attacker
# who compromises the action's repository (cf. the tj-actions/changed-files
# incident), so tags are never used here. The trailing `# vX.Y.Z` comment is the
# human-readable release the SHA corresponds to; Dependabot
# (.github/dependabot.yml) bumps both the SHA and the comment so the pins stay
# patched without giving up immutability. When updating a pin, take the SHA from
# the action's release (`gh api repos/<owner>/<repo>/commits/<tag>`), never a tag.
permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Don't leave the GITHUB_TOKEN in the local git config, where a later
          # (potentially compromised) step could read and abuse it. This
          # workflow never pushes, so it has no need for persisted credentials.
          persist-credentials: false

      # mise-action installs every tool declared in .mise.toml, so no separate
      # `mise install` step is needed.
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - run: mise run ci

      # Publish the WASM artifact (plus a SHA-256 checksum) from the Linux job
      # only -- the module is platform-independent, so one upload is enough and
      # avoids duplicate-artifact-name collisions across the matrix.
      - name: Checksum WASM artifact
        if: matrix.os == 'ubuntu-latest'
        run: shasum -a 256 zig-out/wasm/opaque.wasm | tee zig-out/wasm/opaque.wasm.sha256

      - name: Upload WASM artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: opaque-wasm
          path: |
            zig-out/wasm/opaque.wasm
            zig-out/wasm/opaque.wasm.sha256
          if-no-files-found: error
