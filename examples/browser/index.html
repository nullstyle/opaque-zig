<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OPAQUE WASM Browser Example</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }

      body {
        margin: 2rem;
        max-width: 48rem;
      }

      label,
      button,
      output {
        display: block;
        margin-block: 1rem;
      }

      input {
        box-sizing: border-box;
        display: block;
        margin-top: 0.25rem;
        width: 100%;
      }

      code,
      output {
        overflow-wrap: anywhere;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>OPAQUE WASM Browser Example</h1>

    <label>
      WASM URL
      <input id="wasm-url" value="../../zig-out/wasm/opaque.wasm">
    </label>

    <label>
      Password
      <input id="password" type="password" value="correct horse battery staple">
    </label>

    <button id="run" type="button">Run registrationStart</button>
    <output id="status">Idle</output>

    <script type="module">
      import {
        bytesToBase64,
        bytesToHex,
        encodeRegistrationStartInput,
        instantiateOpaqueWasm,
        utf8Encode,
      } from "../../web/browser.ts";

      const wasmUrl = document.querySelector("#wasm-url");
      const password = document.querySelector("#password");
      const run = document.querySelector("#run");
      const status = document.querySelector("#status");

      run.addEventListener("click", async () => {
        run.disabled = true;
        status.value = "Loading WASM...";

        try {
          const opaque = await instantiateOpaqueWasm(wasmUrl.value);
          opaque.assertVersion(3);

          const blindUniform = crypto.getRandomValues(new Uint8Array(64));
          const input = encodeRegistrationStartInput({
            blindUniform,
            password: utf8Encode(password.value),
          });
          const response = opaque.registrationStart(input);

          status.value = [
            `blindUniform.hex=${bytesToHex(blindUniform)}`,
            `response.hex=${bytesToHex(response)}`,
            `response.base64=${bytesToBase64(response)}`,
          ].join("\n\n");
        } catch (error) {
          status.value = error instanceof Error ? error.message : String(error);
        } finally {
          run.disabled = false;
        }
      });
    </script>
  </body>
</html>
